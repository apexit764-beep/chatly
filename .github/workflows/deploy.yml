name: Build & Publish dist

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Publish dist to deploy branch
        run: |
          cd dist
          git init -q -b deploy
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"
          git push -f -q "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:deploy
